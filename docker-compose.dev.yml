services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws/dashboard
      - WATCHPACK_POLLING=true
    volumes:
      - ./app:/app/app
      - ./components:/app/components
      - ./lib:/app/lib
      - ./public:/app/public
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/infraview.db
      - JWT_SECRET_KEY=dev-secret-key-do-not-use-in-prod
      - AGENT_API_KEY=dev-agent-key
      - CORS_ORIGINS=["http://localhost:3000"]
    volumes:
      - ./backend/app:/app/app
      - backend-data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on: []

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    network_mode: host
    pid: host
    environment:
      - INFRAVIEW_BACKEND_URL=ws://localhost:8000/ws/agent
      - INFRAVIEW_AGENT_ID=docker-dev
      - INFRAVIEW_INTERVAL=5
      - INFRAVIEW_API_KEY=dev-agent-key
      - HOST_PROC=/host/proc
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro

  # Test container with outdated image for update detection demo
  demo-nginx:
    image: nginx:1.24
    ports:
      - "8080:80"
    restart: unless-stopped

  demo-redis:
    image: redis:7.0
    restart: unless-stopped

volumes:
  backend-data:
