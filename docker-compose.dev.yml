services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws/dashboard
      - WATCHPACK_POLLING=true
    volumes:
      - ./app:/app/app
      - ./components:/app/components
      - ./lib:/app/lib
      - ./public:/app/public
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/infraview.db
    volumes:
      - ./backend/app:/app/app
      - backend-data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on: []

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - INFRAVIEW_BACKEND_URL=ws://localhost:8000/ws/agent
      - INFRAVIEW_AGENT_ID=docker-dev
      - INFRAVIEW_INTERVAL=5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  backend-data:
