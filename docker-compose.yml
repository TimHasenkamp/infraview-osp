services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws/dashboard
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/infraview.db
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - ALERT_FROM_EMAIL=${ALERT_FROM_EMAIL:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - AGENT_API_KEY=${AGENT_API_KEY:?AGENT_API_KEY is required}
    volumes:
      - backend-data:/app/data

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      - INFRAVIEW_BACKEND_URL=ws://backend:8000/ws/agent
      - INFRAVIEW_AGENT_ID=${HOSTNAME:-local-dev}
      - INFRAVIEW_INTERVAL=5
      - INFRAVIEW_API_KEY=${AGENT_API_KEY:?AGENT_API_KEY is required}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - backend

volumes:
  backend-data:
