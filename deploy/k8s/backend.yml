apiVersion: apps/v1
kind: Deployment
metadata:
  name: infraview-backend
  namespace: infraview
  labels:
    app: infraview-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infraview-backend
  template:
    metadata:
      labels:
        app: infraview-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/OWNER/infraview-osp/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: infraview-config
            - secretRef:
                name: infraview-secret
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: infraview-data
---
apiVersion: v1
kind: Service
metadata:
  name: infraview-backend
  namespace: infraview
spec:
  selector:
    app: infraview-backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: infraview-data
  namespace: infraview
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
