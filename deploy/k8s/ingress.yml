apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infraview-ingress
  namespace: infraview
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
spec:
  ingressClassName: nginx
  rules:
    - host: infraview.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: infraview-backend
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: infraview-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infraview-frontend
                port:
                  number: 3000
