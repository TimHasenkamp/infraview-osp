apiVersion: apps/v1
kind: Deployment
metadata:
  name: infraview-frontend
  namespace: infraview
  labels:
    app: infraview-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infraview-frontend
  template:
    metadata:
      labels:
        app: infraview-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/OWNER/infraview-osp/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: infraview-config
                  key: BACKEND_URL
            - name: NEXT_PUBLIC_WS_URL
              valueFrom:
                configMapKeyRef:
                  name: infraview-config
                  key: NEXT_PUBLIC_WS_URL
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: infraview-frontend
  namespace: infraview
spec:
  selector:
    app: infraview-frontend
  ports:
    - port: 3000
      targetPort: 3000
