apiVersion: v1
kind: ConfigMap
metadata:
  name: infraview-config
  namespace: infraview
data:
  DATABASE_URL: "sqlite+aiosqlite:///data/infraview.db"
  CORS_ORIGINS: '["http://localhost:3000"]'
  BACKEND_URL: "http://infraview-backend:8000"
  NEXT_PUBLIC_WS_URL: "ws://localhost:8000/ws/dashboard"
  METRIC_RETENTION_DAYS: "30"
  DOWNSAMPLE_ENABLED: "true"
