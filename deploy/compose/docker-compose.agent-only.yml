# InfraView Agent — auf Remote-Servern deployen
#
# Usage:
#   export BACKEND_HOST=monitor.example.com
#   export AGENT_API_KEY=your-agent-key
#   docker compose -f docker-compose.agent-only.yml up -d

services:
  agent:
    build:
      context: ../../agent
      dockerfile: Dockerfile
    pid: host
    environment:
      - INFRAVIEW_BACKEND_URL=wss://${BACKEND_HOST:?BACKEND_HOST is required}/ws/agent
      - INFRAVIEW_AGENT_ID=${HOSTNAME:-$(hostname)}
      - INFRAVIEW_INTERVAL=${INTERVAL:-5}
      - INFRAVIEW_API_KEY=${AGENT_API_KEY:?AGENT_API_KEY is required}
      - HOST_PROC=/host/proc
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /etc/apt:/etc/apt:ro
      - /var/lib/apt/lists:/var/lib/apt/lists:ro
      - /var/lib/dpkg/status:/var/lib/dpkg/status:ro
    restart: unless-stopped
