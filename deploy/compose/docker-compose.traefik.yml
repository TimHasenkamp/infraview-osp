# InfraView with Traefik — automatic Let's Encrypt SSL
#
# Usage:
#   export DOMAIN=monitor.example.com
#   export ACME_EMAIL=admin@example.com
#   export JWT_SECRET_KEY=$(openssl rand -hex 32)
#   export AGENT_API_KEY=$(openssl rand -hex 16)
#   docker compose -f docker-compose.traefik.yml up -d
#
# First admin password is printed in backend logs:
#   docker compose -f docker-compose.traefik.yml logs backend | grep Password

services:
  traefik:
    image: traefik:v3.6.11
    command:
      - --api.insecure=false
      - --log.level=INFO
      - --accesslog=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?ACME_EMAIL is required}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    restart: unless-stopped

  frontend:
    image: ghcr.io/timhasenkamp/infraview-osp/frontend:latest
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=wss://${DOMAIN:?DOMAIN is required}/ws/dashboard
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=letsencrypt
      - traefik.http.services.frontend.loadbalancer.server.port=3000
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/timhasenkamp/infraview-osp/backend:latest
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/infraview.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - AGENT_API_KEY=${AGENT_API_KEY:?AGENT_API_KEY is required}
      - CORS_ORIGINS=["https://${DOMAIN}"]
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - ALERT_FROM_EMAIL=${ALERT_FROM_EMAIL:-}
    volumes:
      - backend-data:/app/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && PathPrefix(`/ws`)
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls.certresolver=letsencrypt
      - traefik.http.services.backend.loadbalancer.server.port=8000
    restart: unless-stopped

  agent:
    image: ghcr.io/timhasenkamp/infraview-osp/agent:latest
    pid: host
    environment:
      - INFRAVIEW_BACKEND_URL=ws://backend:8000/ws/agent
      - INFRAVIEW_AGENT_ID=${INFRAVIEW_AGENT_ID:?INFRAVIEW_AGENT_ID is required}
      - INFRAVIEW_INTERVAL=5
      - INFRAVIEW_API_KEY=${AGENT_API_KEY:?AGENT_API_KEY is required}
      - HOST_PROC=/host/proc
      - HOST_APT=/host-apt
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /var/lib/dpkg:/host-apt/dpkg:ro
      - /var/lib/apt/lists:/host-apt/lists:ro
      - /etc/apt:/host-apt/etc-apt:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  letsencrypt:
