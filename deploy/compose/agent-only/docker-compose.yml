# InfraView Agent — deploy this on every server you want to monitor.
#
# 1. Copy .env.example to .env and fill in the values
# 2. Run: docker compose up -d

services:
  agent:
    image: ghcr.io/timhasenkamp/infraview-osp/agent:latest
    restart: unless-stopped
    pid: host
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /var/lib/dpkg:/host-apt/dpkg:ro
      - /var/lib/apt/lists:/host-apt/lists:ro
      - /etc/apt:/host-apt/etc-apt:ro
    environment:
      - HOST_PROC=/host/proc
      - HOST_APT=/host-apt
