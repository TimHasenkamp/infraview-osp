# InfraView with nginx — eigenes SSL-Zertifikat
#
# Usage:
#   1. Zertifikat und Key ablegen:
#      deploy/compose/certs/fullchain.pem
#      deploy/compose/certs/privkey.pem
#
#   2. Starten:
#      export DOMAIN=monitor.example.com
#      export JWT_SECRET_KEY=$(openssl rand -hex 32)
#      export AGENT_API_KEY=$(openssl rand -hex 16)
#      docker compose -f docker-compose.nginx-ssl.yml up -d
#
# First admin password is printed in backend logs:
#   docker compose -f docker-compose.nginx-ssl.yml logs backend | grep Password

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./certs:/etc/nginx/certs:ro
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN is required}
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: Dockerfile.frontend
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=wss://${DOMAIN}/ws/dashboard
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/infraview.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - AGENT_API_KEY=${AGENT_API_KEY:?AGENT_API_KEY is required}
      - CORS_ORIGINS=["https://${DOMAIN}"]
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - ALERT_FROM_EMAIL=${ALERT_FROM_EMAIL:-}
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  agent:
    build:
      context: ../../agent
      dockerfile: Dockerfile
    pid: host
    environment:
      - INFRAVIEW_BACKEND_URL=ws://backend:8000/ws/agent
      - INFRAVIEW_AGENT_ID=${HOSTNAME:-local}
      - INFRAVIEW_INTERVAL=5
      - INFRAVIEW_API_KEY=${AGENT_API_KEY:?AGENT_API_KEY is required}
      - HOST_PROC=/host/proc
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
