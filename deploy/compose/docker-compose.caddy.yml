# InfraView with Caddy — automatisches HTTPS (zero config)
#
# Usage:
#   export DOMAIN=monitor.example.com
#   export JWT_SECRET_KEY=$(openssl rand -hex 32)
#   export AGENT_API_KEY=$(openssl rand -hex 16)
#   docker compose -f docker-compose.caddy.yml up -d
#
# Caddy holt sich automatisch ein Let's Encrypt Zertifikat.
# Port 80 und 443 müssen offen sein.
#
# First admin password is printed in backend logs:
#   docker compose -f docker-compose.caddy.yml logs backend | grep Password

services:
  caddy:
    image: caddy:2.11.2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN is required}
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    image: ghcr.io/timhasenkamp/infraview-osp/frontend:latest
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=wss://${DOMAIN}/ws/dashboard
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/timhasenkamp/infraview-osp/backend:latest
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/infraview.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - AGENT_API_KEY=${AGENT_API_KEY:?AGENT_API_KEY is required}
      - CORS_ORIGINS=["https://${DOMAIN}"]
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - ALERT_FROM_EMAIL=${ALERT_FROM_EMAIL:-}
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  agent:
    image: ghcr.io/timhasenkamp/infraview-osp/agent:latest
    pid: host
    environment:
      - INFRAVIEW_BACKEND_URL=ws://backend:8000/ws/agent
      - INFRAVIEW_AGENT_ID=${HOSTNAME:-local}
      - INFRAVIEW_INTERVAL=5
      - INFRAVIEW_API_KEY=${AGENT_API_KEY:?AGENT_API_KEY is required}
      - HOST_PROC=/host/proc
      - HOST_APT=/host-apt
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /var/lib/dpkg:/host-apt/dpkg:ro
      - /var/lib/apt/lists:/host-apt/lists:ro
      - /etc/apt:/host-apt/etc-apt:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  caddy-data:
  caddy-config:
